name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (leave empty to use VERSION file)'
        required: false
        type: string
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '[\d]+\.[\d]+\.[\d]+' VERSION | head -1)
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Prepare Windows-safe spec
        shell: pwsh
        run: |
          # Remove Linux-only hidden imports (SecretStorage, jeepney — D-Bus backends)
          (Get-Content A3-Agent.spec -Raw) `
            -replace "'SecretStorage',\s*", "" `
            -replace "'jeepney',\s*", "" |
            Set-Content A3-Agent-win.spec -NoNewline
          Write-Host "Windows-safe spec written to A3-Agent-win.spec"

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "  A3-Agent — PyInstaller Windows Build"
          Write-Host "============================================"
          pyinstaller A3-Agent-win.spec --clean --noconfirm
          if (-not (Test-Path "dist\A3-Agent\A3-Agent.exe")) {
            Write-Host "ERROR: A3-Agent.exe not found after build"
            exit 1
          }
          Write-Host "Build successful: dist\A3-Agent\A3-Agent.exe"

      - name: Package release
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          if ("${{ github.event.inputs.version_override }}") {
            $version = "${{ github.event.inputs.version_override }}"
          }
          $pkg = "A3-Agent-v$version-win64"
          $releaseDir = "release\$pkg"

          Write-Host "============================================"
          Write-Host "  Packaging: $pkg"
          Write-Host "============================================"

          # Prepare release directory
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          # Copy build output
          Copy-Item -Recurse "dist\A3-Agent\*" "$releaseDir\"
          Write-Host "  [OK] Build output copied"

          # Add documentation
          if (Test-Path LICENSE) {
            Copy-Item LICENSE "$releaseDir\"
            Write-Host "  [OK] LICENSE"
          }
          if (Test-Path README.md) {
            Copy-Item README.md "$releaseDir\README.txt"
            Write-Host "  [OK] README.txt"
          }
          $pkg | Out-File -Encoding ASCII "$releaseDir\VERSION"
          Write-Host "  [OK] VERSION"

          # Create zip archive
          $zipPath = "release\$pkg.zip"
          Compress-Archive -Path $releaseDir -DestinationPath $zipPath -Force
          $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
          Write-Host "  [OK] $pkg.zip ($sizeMB MB)"

          # Generate SHA256
          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          $shaPath = "release\$pkg.sha256"
          "$hash  $pkg.zip" | Out-File -Encoding ASCII $shaPath
          Write-Host "  [OK] SHA256: $hash"

          # Output for downstream steps
          echo "package_name=$pkg" >> $env:GITHUB_OUTPUT
          echo "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          echo "sha_path=$shaPath" >> $env:GITHUB_OUTPUT

          Write-Host ""
          Write-Host "============================================"
          Write-Host "  Package complete"
          Write-Host "  $zipPath"
          Write-Host "  $shaPath"
          Write-Host "============================================"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: A3-Agent-win64
          path: |
            release/A3-Agent-v*-win64.zip
            release/A3-Agent-v*-win64.sha256
          retention-days: 7

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/A3-Agent-v*-win64.zip
            release/A3-Agent-v*-win64.sha256
