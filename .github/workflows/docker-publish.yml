# Docker Publish — Build + Push to Docker Hub / GHCR
name: Docker Publish

on:
  push:
    tags:
      - "v*"             # v1.0.0, v1.0.0-alpha, etc.
    # main push removed — automatic publishing on every merge is unsafe
    # until production verification stabilizes. Use workflow_dispatch.
  workflow_dispatch:      # Manual trigger

env:
  # GHCR-only publishing (Docker Hub removed per Post-Release Audit:
  # DOCKERHUB_* secrets are not configured). Re-add IMAGE_NAME:
  # leisureauf1/a3-multi-agent-system when Docker Hub login restored.

jobs:
  # ═══════════════════════════════════════════════════════
  # Test gate
  # ═══════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Veritas-Core
        run: |
          git clone https://github.com/Leisure-Auf1/Veritas-Core.git /tmp/veritas-core
          pip install -e /tmp/veritas-core

      - name: Install deps + test
        run: |
          pip install -r requirements.txt pytest
          # CI-only compatibility (same scope as PR #28 fix in test.yml):
          # unpinned starlette requires httpx2; sklearn is a test-only dep.
          pip install httpx2 scikit-learn
          python -m pytest tests/ -q --tb=short

  # ═══════════════════════════════════════════════════════
  # Build + Push
  # ═══════════════════════════════════════════════════════
  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Metadata ──────────────────────────────────────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── QEMU for multi-arch ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Buildx ────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── GHCR login ────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build + Push ──────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
