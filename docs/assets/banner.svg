<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Accent line -->
  <rect x="40" y="130" width="300" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Title -->
  <text x="40" y="90" font-family="monospace" font-size="48" font-weight="bold" fill="#58a6ff">
    A3-Agent
  </text>

  <!-- Subtitle -->
  <text x="40" y="120" font-family="monospace" font-size="20" fill="#8b949e">
    Production-ready Multi-Agent Learning Platform
  </text>

  <!-- Agent pipeline visualization -->
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="140" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="70" y="20" font-family="monospace" font-size="12" fill="#58a6ff" text-anchor="middle">ProfileAgent</text>
    <text x="70" y="36" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">cognitive analysis</text>

    <text x="150" y="28" font-family="monospace" font-size="14" fill="#30363d">→</text>

    <rect x="170" y="0" width="140" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="240" y="20" font-family="monospace" font-size="12" fill="#58a6ff" text-anchor="middle">PlannerAgent</text>
    <text x="240" y="36" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">learning path</text>

    <text x="320" y="28" font-family="monospace" font-size="14" fill="#30363d">→</text>

    <rect x="340" y="0" width="140" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="410" y="20" font-family="monospace" font-size="12" fill="#58a6ff" text-anchor="middle">ResourceAgent</text>
    <text x="410" y="36" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">recommendations</text>

    <text x="490" y="28" font-family="monospace" font-size="14" fill="#30363d">→</text>

    <rect x="510" y="0" width="140" height="48" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="580" y="20" font-family="monospace" font-size="12" fill="#3fb950" text-anchor="middle">ReviewGate</text>
    <text x="580" y="36" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">quality evaluation</text>
  </g>

  <!-- Stats bar -->
  <g transform="translate(40, 255)">
    <text x="0" y="10" font-family="monospace" font-size="13" fill="#8b949e">2661 tests</text>
    <text x="0" y="26" font-family="monospace" font-size="11" fill="#3fb950">0 failures</text>

    <text x="150" y="10" font-family="monospace" font-size="13" fill="#8b949e">7 agents</text>
    <text x="150" y="26" font-family="monospace" font-size="11" fill="#58a6ff">EventBus pipeline</text>

    <text x="300" y="10" font-family="monospace" font-size="13" fill="#8b949e">Cross-platform</text>
    <text x="300" y="26" font-family="monospace" font-size="11" fill="#58a6ff">Win · Linux · Docker</text>

    <text x="500" y="10" font-family="monospace" font-size="13" fill="#8b949e">MIT License</text>
    <text x="500" y="26" font-family="monospace" font-size="11" fill="#8b949e">Open Source</text>
  </g>

  <!-- Version badge -->
  <rect x="1040" y="20" width="120" height="24" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="1100" y="37" font-family="monospace" font-size="12" fill="#58a6ff" text-anchor="middle">v1.0.0</text>
</svg>
