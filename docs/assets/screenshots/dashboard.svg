<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <rect width="900" height="600" fill="#0d1117"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="600" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="15" y="30" fill="#c9d1d9" font-size="14" font-family="monospace">👤 Demo</text>
  <text x="15" y="55" fill="#3fb950" font-size="11" font-family="monospace">🎭 Demo Mode</text>
  <text x="15" y="85" fill="#8b949e" font-size="11" font-family="monospace">No LLM configured</text>
  <text x="15" y="120" fill="#58a6ff" font-size="13" font-family="monospace">🏠 Dashboard</text>
  <text x="15" y="145" fill="#8b949e" font-size="12" font-family="monospace">🎓 Learning</text>
  <text x="15" y="170" fill="#8b949e" font-size="12" font-family="monospace">📜 History</text>
  <text x="15" y="195" fill="#8b949e" font-size="12" font-family="monospace">📂 Workspace</text>
  <text x="15" y="220" fill="#8b949e" font-size="12" font-family="monospace">👤 Profile</text>
  <text x="15" y="245" fill="#8b949e" font-size="12" font-family="monospace">⚙️ Settings</text>
  <!-- Main -->
  <text x="220" y="35" fill="#c9d1d9" font-size="22" font-family="monospace" font-weight="bold">🏠 Dashboard</text>
  <!-- Demo Banner -->
  <rect x="220" y="50" width="660" height="40" rx="4" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="260" y="76" fill="#58a6ff" font-size="13" font-family="monospace">🎭 Demo Mode — exploring with rule-based AI</text>
  <!-- Stats -->
  <rect x="220" y="105" width="155" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="235" y="128" fill="#8b949e" font-size="10" font-family="monospace">📚 Sessions</text>
  <text x="235" y="150" fill="#58a6ff" font-size="18" font-family="monospace">1</text>
  <rect x="385" y="105" width="155" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="128" fill="#8b949e" font-size="10" font-family="monospace">⭐ Avg Score</text>
  <text x="400" y="150" fill="#58a6ff" font-size="18" font-family="monospace">90%</text>
  <rect x="550" y="105" width="155" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="565" y="128" fill="#8b949e" font-size="10" font-family="monospace">⏱️ Total Time</text>
  <text x="565" y="150" fill="#58a6ff" font-size="18" font-family="monospace">595ms</text>
  <rect x="715" y="105" width="155" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="730" y="128" fill="#8b949e" font-size="10" font-family="monospace">🔢 Tokens</text>
  <text x="730" y="150" fill="#58a6ff" font-size="18" font-family="monospace">0</text>
  <!-- Memory Card -->
  <text x="220" y="200" fill="#c9d1d9" font-size="16" font-family="monospace">🧠 AI Memory</text>
  <rect x="220" y="210" width="155" height="45" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="235" y="230" fill="#8b949e" font-size="9" font-family="monospace">Mastered Concepts</text>
  <text x="235" y="248" fill="#3fb950" font-size="16" font-family="monospace">0</text>
  <rect x="385" y="210" width="155" height="45" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="230" fill="#8b949e" font-size="9" font-family="monospace">Weak Areas</text>
  <text x="400" y="248" fill="#f85149" font-size="16" font-family="monospace">0</text>
  <rect x="550" y="210" width="155" height="45" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="565" y="230" fill="#8b949e" font-size="9" font-family="monospace">Sessions</text>
  <text x="565" y="248" fill="#58a6ff" font-size="16" font-family="monospace">1</text>
  <!-- Goal Suggestions -->
  <text x="220" y="290" fill="#c9d1d9" font-size="16" font-family="monospace">🎯 Try These</text>
  <rect x="220" y="300" width="210" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="235" y="320" fill="#c9d1d9" font-size="11" font-family="monospace">🐍 Learn Python basics</text>
  <text x="235" y="338" fill="#8b949e" font-size="9" font-family="monospace">Variables, loops, functions</text>
  <rect x="440" y="300" width="210" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="320" fill="#c9d1d9" font-size="11" font-family="monospace">🤖 Understand ML</text>
  <text x="455" y="338" fill="#8b949e" font-size="9" font-family="monospace">Supervised vs unsupervised</text>
  <rect x="660" y="300" width="210" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="675" y="320" fill="#c9d1d9" font-size="11" font-family="monospace">📊 Data structures</text>
  <text x="675" y="338" fill="#8b949e" font-size="9" font-family="monospace">Lists, trees, graphs</text>
  <!-- Custom Goal -->
  <text x="220" y="395" fill="#c9d1d9" font-size="14" font-family="monospace">✏️ Custom Goal</text>
  <rect x="220" y="405" width="650" height="50" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="235" y="428" fill="#484f58" font-size="11" font-family="monospace">e.g., I'm a CS student with basic Python...</text>
  <rect x="220" y="465" width="120" height="30" rx="6" fill="#238636"/>
  <text x="240" y="486" fill="#ffffff" font-size="12" font-family="monospace">🚀 Start Learning</text>
</svg>