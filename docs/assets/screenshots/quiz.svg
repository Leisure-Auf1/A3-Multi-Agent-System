  <text x="235" y="158" fill="#3fb950" font-size="11" font-family="monospace">● To solve specific problems efficiently  ✅</text>
  <text x="235" y="175" fill="#8b949e" font-size="10" font-family="monospace">○ To replace human decision-making</text>
  <text x="235" y="192" fill="#8b949e" font-size="10" font-family="monospace">○ To store large amounts of data</text>
  <rect x="220" y="205" width="660" height="70" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="235" y="228" fill="#c9d1d9" font-size="12" font-family="monospace">Q2. Which is a key concept in Python?</text>
  <text x="235" y="248" fill="#3fb950" font-size="11" font-family="monospace">● Structured reasoning  ✅</text>
